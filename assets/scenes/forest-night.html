<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forest Night Path</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #020818; overflow: hidden; }
  canvas { display: block; }
  #ui {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(140, 180, 255, 0.3);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    pointer-events: none;
    font-family: 'Georgia', serif;
  }
</style>
</head>
<body>
<div id="ui">↑ / ↓ · speed &nbsp;·&nbsp; click · pause</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020c1e);
scene.fog = new THREE.FogExp2(0x04122e, 0.040);

const camera = new THREE.PerspectiveCamera(68, innerWidth / innerHeight, 0.1, 280);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

function hash(n) { return Math.abs((Math.sin(n * 127.1 + 311.7) * 43758.5453123) % 1); }
function noise2(x, z) {
  const ix = Math.floor(x), iz = Math.floor(z);
  const fx = x - ix, fz = z - iz;
  const ux = fx * fx * (3 - 2 * fx), uz = fz * fz * (3 - 2 * fz);
  const a = hash(ix + iz * 57), b = hash(ix + 1 + iz * 57);
  const c = hash(ix + (iz + 1) * 57), d = hash(ix + 1 + (iz + 1) * 57);
  return a + (b - a) * ux + (c - a) * uz + (b - a + a - b + d - c) * ux * uz;
}
function fbm(x, z, oct) {
  let v = 0, a = 0.5, f = 1, m = 0;
  for (let i = 0; i < oct; i++) { v += noise2(x * f, z * f) * a; m += a; a *= 0.5; f *= 2.1; }
  return v / m;
}

function terrainHeight(x, z) {
  const raw = fbm(x * 0.055, z * 0.055, 6) * 20 + fbm(x * 0.025 + 5, z * 0.025, 4) * 12 - 7;
  const d = Math.abs(x);
  const blend = Math.min(1, Math.max(0, (d - 2.2) / 5.0));
  return raw * blend * blend;
}

const TILE_W = 38;
const TILE_D = 28;
const SEGS_X = 16;
const SEGS_Z = 12;
const COLS = 9;
const ROWS = 14;

const tilePool = [];
const nextRowZ = {};

function buildTileGeo(col, rowZ) {
  const geo = new THREE.PlaneGeometry(TILE_W, TILE_D, SEGS_X, SEGS_Z);
  geo.rotateX(-Math.PI / 2);
  const pos = geo.attributes.position;
  const wx = col * TILE_W;
  const wz = rowZ;
  for (let i = 0; i < pos.count; i++) {
    pos.setY(i, terrainHeight(wx + pos.getX(i), wz + pos.getZ(i)));
  }
  pos.needsUpdate = true;
  geo.computeVertexNormals();
  return geo;
}

function tileColor(col) {
  const d = Math.abs(col);
  return new THREE.Color().setHSL(0.61 + d * 0.01, 0.55, Math.max(0.025, 0.075 - d * 0.008));
}

function createTileMesh(col) {
  const mat = new THREE.MeshPhongMaterial({
    color: tileColor(col),
    emissive: new THREE.Color().setHSL(0.63, 0.5, 0.010),
    specular: new THREE.Color(0x0f2244),
    shininess: 10,
    flatShading: true,
  });
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), mat);
  mesh.userData = { col, rowZ: 0 };
  scene.add(mesh);
  return mesh;
}

function placeTile(mesh, col, rowZ) {
  mesh.userData.col = col;
  mesh.userData.rowZ = rowZ;
  mesh.geometry.dispose();
  mesh.geometry = buildTileGeo(col, rowZ);
  mesh.position.set(col * TILE_W, 0, rowZ);
}

const HALF = Math.floor(COLS / 2);
for (let c = -HALF; c <= HALF; c++) {
  nextRowZ[c] = 0;
  for (let r = 0; r < ROWS; r++) {
    const m = createTileMesh(c);
    placeTile(m, c, nextRowZ[c]);
    nextRowZ[c] += TILE_D;
    tilePool.push(m);
  }
}

function recycleTerrain(camZ) {
  tilePool.forEach(mesh => {
    if (mesh.userData.rowZ + TILE_D < camZ - TILE_D * 2) {
      const c = mesh.userData.col;
      placeTile(mesh, c, nextRowZ[c]);
      nextRowZ[c] += TILE_D;
    }
  });
}

const PATH_LEN = TILE_D * ROWS;
const PATH_SEGS_Z = 80;
const pathGeo = new THREE.PlaneGeometry(4.2, PATH_LEN, 5, PATH_SEGS_Z);
pathGeo.rotateX(-Math.PI / 2);

function conformPathGeo(camZ) {
  const pos = pathGeo.attributes.position;
  for (let i = 0; i < pos.count; i++) {
    const lz = pos.getZ(i);
    pos.setY(i, terrainHeight(pos.getX(i), camZ + lz) + 0.06);
  }
  pos.needsUpdate = true;
  pathGeo.computeVertexNormals();
}

const pathMat = new THREE.MeshPhongMaterial({
  color: 0x0b1a35,
  emissive: 0x050e22,
  specular: 0x1a3566,
  shininess: 30,
  flatShading: true,
});
const pathMesh = new THREE.Mesh(pathGeo, pathMat);
scene.add(pathMesh);

function makeEdge(xOff) {
  const eg = new THREE.PlaneGeometry(0.22, PATH_LEN, 1, PATH_SEGS_Z);
  eg.rotateX(-Math.PI / 2);
  const em = new THREE.MeshBasicMaterial({ color: 0x1e4d99, transparent: true, opacity: 0.5 });
  const e = new THREE.Mesh(eg, em);
  scene.add(e);
  return e;
}
const edgeL = makeEdge(-2.12);
const edgeR = makeEdge(2.12);

function updatePath(camZ) {
  pathMesh.position.set(0, 0, camZ);
  edgeL.position.set(-2.12, 0.15, camZ);
  edgeR.position.set(2.12, 0.15, camZ);
  conformPathGeo(camZ);
}

const TREE_COUNT = 320;
const trees = [];

function buildTree() {
  const g = new THREE.Group();
  const trunkH = 0.9 + Math.random() * 1.1;

  const tGeo = new THREE.CylinderGeometry(0.045, 0.13, trunkH, 5);
  const tMat = new THREE.MeshPhongMaterial({ color: 0x030b18, flatShading: true });
  const trunk = new THREE.Mesh(tGeo, tMat);
  trunk.position.y = trunkH / 2;
  g.add(trunk);

  const layers = 3 + Math.floor(Math.random() * 3);
  for (let i = 0; i < layers; i++) {
    const ti = i / (layers - 1);
    const radius = (1.05 - ti * 0.6) * (0.75 + Math.random() * 0.5);
    const cGeo = new THREE.ConeGeometry(radius, 1.3 + Math.random() * 0.5, 6);
    const hue = 0.595 + Math.random() * 0.065;
    const cMat = new THREE.MeshPhongMaterial({
      color: new THREE.Color().setHSL(hue, 0.55, 0.038 + ti * 0.02),
      emissive: new THREE.Color().setHSL(0.62, 0.45, 0.012),
      flatShading: true,
    });
    const cone = new THREE.Mesh(cGeo, cMat);
    cone.position.y = trunkH + i * (1.05 + Math.random() * 0.35);
    g.add(cone);
  }

  const s = 0.55 + Math.random() * 1.6;
  g.scale.setScalar(s);
  g.rotation.y = Math.random() * Math.PI * 2;
  g.userData = { worldZ: -9999, side: 1, xDist: 4 };
  scene.add(g);
  trees.push(g);
  return g;
}

for (let i = 0; i < TREE_COUNT; i++) buildTree();

function placeTree(tree, worldZ) {
  const side = Math.random() < 0.5 ? 1 : -1;
  const xDist = 2.6 + Math.random() * 16;
  const x = side * xDist;
  tree.position.set(x, terrainHeight(x, worldZ), worldZ);
  tree.userData.worldZ = worldZ;
}

let nextTreeZ = 4;
trees.forEach(tree => {
  placeTree(tree, nextTreeZ);
  nextTreeZ += (TILE_D * ROWS) / TREE_COUNT;
});

function recycleTrees(camZ) {
  trees.forEach(tree => {
    if (tree.userData.worldZ < camZ - TILE_D * 2.5) {
      placeTree(tree, nextTreeZ);
      nextTreeZ += 1.2 + Math.random() * 2.2;
    }
  });
}

(function() {
  const N = 2400;
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(1 - Math.random() * 0.88);
    const r = 240;
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.cos(ph) + 25;
    pos[i*3+2] = r * Math.sin(ph) * Math.sin(th);
    const t = Math.random();
    col[i*3]   = 0.5 + t * 0.2;
    col[i*3+1] = 0.65 + t * 0.2;
    col[i*3+2] = 1.0;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(geo,
    new THREE.PointsMaterial({ size: 0.42, vertexColors: true, fog: false })));
})();

(function() {
  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(12, 10, 10),
    new THREE.MeshBasicMaterial({ color: 0xbdd4ff, fog: false })
  );
  moon.position.set(-55, 105, -180);
  scene.add(moon);
  moon.add(new THREE.Mesh(
    new THREE.SphereGeometry(19, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0x2244aa, transparent: true, opacity: 0.07, fog: false, side: THREE.BackSide })
  ));
})();

const ambient = new THREE.AmbientLight(0x0e2255, 1.15);
scene.add(ambient);
const moonDir = new THREE.DirectionalLight(0x3b6adc, 1.5);
moonDir.position.set(-55, 105, -180);
scene.add(moonDir);
scene.add(new THREE.HemisphereLight(0x0a1d48, 0x050e28, 0.65));

const pathLight = new THREE.PointLight(0x2255cc, 1.1, 12);
scene.add(pathLight);

const fireflies = [];
for (let i = 0; i < 60; i++) {
  const fl = new THREE.Mesh(
    new THREE.SphereGeometry(0.055, 4, 4),
    new THREE.MeshBasicMaterial({ color: 0x77aaff, transparent: true, opacity: 0.75 })
  );
  fl.userData = {
    ox: (Math.random() - 0.5) * 24,
    oy: 0.35 + Math.random() * 3.5,
    oz: (Math.random() - 0.5) * 45,
    ph: Math.random() * Math.PI * 2,
    sp: 0.25 + Math.random() * 0.55,
  };
  scene.add(fl);
  fireflies.push(fl);
}

let camWorldZ = 5;
let walkSpeed  = 4.5;
let targetSpeed = 4.5;
let paused = false;

const smoothPos  = new THREE.Vector3(0, 1.75, 5);
const smoothLook = new THREE.Vector3(0, 1.6, 14);

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp'   || e.key === 'w') targetSpeed = 12;
  if (e.key === 'ArrowDown' || e.key === 's') targetSpeed = 1.0;
});
window.addEventListener('keyup', e => {
  if (['ArrowUp','w','ArrowDown','s'].includes(e.key)) targetSpeed = 4.5;
});
renderer.domElement.addEventListener('click', () => { paused = !paused; });
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

const clock = new THREE.Clock();
let last = performance.now();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const dt  = Math.min((now - last) / 1000, 0.05);
  last = now;
  const t = clock.getElapsedTime();

  if (!paused) {
    walkSpeed  += (targetSpeed - walkSpeed) * 4 * dt;
    camWorldZ  += walkSpeed * dt;
  }

  const swayX  = Math.sin(t * 0.35) * 0.20 + Math.sin(t * 0.85) * 0.08;
  const groundY = terrainHeight(swayX, camWorldZ);
  const eyeY   = groundY + 1.72;

  const lookZ  = camWorldZ + 10;
  const lookGY = terrainHeight(swayX * 0.3, lookZ);
  const bob    = Math.sin(t * walkSpeed * 0.65) * 0.035;

  const tPos  = new THREE.Vector3(swayX, eyeY, camWorldZ);
  const tLook = new THREE.Vector3(swayX * 0.25, lookGY + 1.52 + bob, lookZ);

  smoothPos.lerp(tPos, 0.10);
  smoothLook.lerp(tLook, 0.07);

  camera.position.copy(smoothPos);
  camera.lookAt(smoothLook);

  pathLight.position.set(smoothPos.x, smoothPos.y + 0.2, smoothPos.z - 0.5);

  fireflies.forEach(fl => {
    const d = fl.userData;
    fl.position.set(
      smoothPos.x + d.ox + Math.sin(t * d.sp + d.ph) * 1.4,
      groundY + d.oy + Math.sin(t * d.sp * 1.2 + d.ph) * 0.5,
      smoothPos.z + d.oz + Math.cos(t * d.sp * 0.75) * 1.8
    );
    fl.material.opacity = 0.35 + Math.sin(t * d.sp * 1.9 + d.ph) * 0.38;
  });

  recycleTerrain(camWorldZ);
  recycleTrees(camWorldZ);
  updatePath(camWorldZ);

  ambient.intensity = 1.15 + Math.sin(t * 0.22) * 0.07;

  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>
